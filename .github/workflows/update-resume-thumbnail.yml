name: Update resume thumbnail

on:
  push:
    branches:
      - main
    paths:
      - Resume.pdf

permissions:
  contents: write

jobs:
  update-thumbnail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install poppler-utils
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Convert first page of PDF to PNG
        shell: bash
        run: |
          pdftoppm -png -f 1 -l 1 -scale-to-x 800 -scale-to-y -1 Resume.pdf Resume
          mv Resume-1.png Resume.png

      - name: Commit and push thumbnail
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update Resume thumbnail"
          file_pattern: "Resume.png"
